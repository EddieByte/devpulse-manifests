apiVersion: apps/v1
kind: Deployment
metadata:
  name: devpulse-deployment
  labels:
    app: devpulse
spec:
  # Replicas will be managed by overlays
  selector:
    matchLabels:
      app: devpulse
  template:
    metadata:
      labels:
        app: devpulse
    spec:
      containers:
      - name: devpulse
        image: eddiebyte/devpulse:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
